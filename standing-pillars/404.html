  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await I18n.init();
      const lang = I18n.getLang();
      document.title = I18n.t('notFound.title') || document.title;
      const homeLink = document.querySelector('.home-link');
      const logoLink = document.querySelector('.logo');
      if (lang === 'de') {
        homeLink.href = '/de/';
        logoLink.href = '/de/';
      } else if (lang === 'hr') {
        homeLink.href = '/hr/';
        logoLink.href = '/hr/';
      }
    });
