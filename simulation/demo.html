// Interpolate day/night keyframes
function getDayNightAmbient() {
  var kf = dayNight.keyframes;
  var t = dayNight.time % 1;
  // Find surrounding keyframes
  for (var i = 0; i < kf.length - 1; i++) {
    if (t >= kf[i].t && t <= kf[i + 1].t) {
      var span = kf[i + 1].t - kf[i].t;
      var f = span > 0 ? (t - kf[i].t) / span : 0;
      // ease-out cubic (matches game engine)
      var ease = 1 - Math.pow(1 - f, 3);
      return {
        ambient: kf[i].ambient + (kf[i + 1].ambient - kf[i].ambient) * ease,
        color: [
          Math.round(kf[i].color[0] + (kf[i + 1].color[0] - kf[i].color[0]) * ease),
          Math.round(kf[i].color[1] + (kf[i + 1].color[1] - kf[i].color[1]) * ease),
          Math.round(kf[i].color[2] + (kf[i + 1].color[2] - kf[i].color[2]) * ease)
        ]
      };
    }
  }
  return { ambient: 0.30, color: [200, 220, 255] }; // fallback day
}

  'door_opened_wall_brick': 'assets/tiles/door_opened_wall_brick.png',
  'light': 'assets/tiles/light.png'
};

// Door state
var door = null;          // { x, y, open, transform }
var doorOpenImg = null;
var doorClosedImg = null;
function playSound(snd) {
  // sounds removed - no-op
}

// =============================================
// SETUP
// =============================================
function setup() {
  createCanvas(windowWidth, windowHeight);
  noSmooth();
  pixelDensity(1);

  fetch('map_compact.json')
    .then(function(r) { return r.json(); })
    .then(function(mapData) {
      MAP_W = mapData.worldWidth;
      MAP_H = mapData.worldHeight;
      mapTiles = mapData.tiles;
      interactiveTiles = mapData.interactiveTiles || [];

      // Build blocked + roof sets from actual tile data
      for (var k in mapTiles) {
        var layers = mapTiles[k];
        var isBlocked = false;
        for (var li = 0; li < layers.length; li++) {
          if (layers[li].walkable === false) isBlocked = true;
          if (layers[li].layer >= 3 || layers[li].type.indexOf('roof') >= 0) {
            roofCells.add(k);
          }
        }
        if (isBlocked) blocked.add(k);
      }
      // Door also blocks
      for (var i = 0; i < interactiveTiles.length; i++) {
        var it = interactiveTiles[i];
        if (it.type.indexOf('door') >= 0 && it.doorState === 'closed') {
          blocked.add(it.x + ',' + it.y);
          door = { x: it.x, y: it.y, open: false, transform: it.transform };
        }
      }

      // Load lighting config from map
      if (mapData.lighting && mapData.lighting.enabled) {
        simLighting.enabled = true;
        simLighting.ambientLight = mapData.lighting.ambientLight || 0.3;
        simLighting.ambientColor = mapData.lighting.ambientColor || [200, 220, 255];
        simLighting.roofShadowDarkness = mapData.lighting.roofShadowDarkness || 0.7;
        simLighting.lights = (mapData.lighting.lights || []).map(function(l) {
          return {
            x: l.x, y: l.y,
            intensity: l.intensity || 1,
            radius: 4,            // wider reach
            falloff: 0.2,         // near-zero like engine - smooth layered circles
            brightness: l.brightness || 1,
            color: l.color || [255, 255, 200],
            castsShadows: l.castsShadows !== false,
            enabled: l.enabled !== false
          };
        });
      }

      // Collect tile types & load images
      var tileTypes = new Set();
      for (var k2 in mapTiles) {
        mapTiles[k2].forEach(function(t) { tileTypes.add(t.type); });
      }
      interactiveTiles.forEach(function(it2) { tileTypes.add(it2.type); });
      // Also ensure the opened door sprite is loaded
      tileTypes.add('door_opened_wall_brick');

      var pending = 0, done = 0;
      tileTypes.forEach(function(type) { if (TILE_IMAGE_MAP[type]) pending++; });
      pending += 2 * DIRS.length * (1 + WALK_FRAMES);
      // Count animation frames
      for (var animType in TILE_ANIMS) {
        pending += TILE_ANIMS[animType].frames.length;
      }

      function onLoaded() { done++; if (done >= pending) finishLoading(); }

      tileTypes.forEach(function(type) {
        var path = TILE_IMAGE_MAP[type];
        if (path) {
          loadImage(path, function(img) { tileImages[type] = img; onLoaded(); },
            function() { onLoaded(); });
        }
      });

      ['kid','female'].forEach(function(who) {
        npcSprites[who] = { idle: {}, walk: {} };
        DIRS.forEach(function(dir) {
          loadImage('assets/sprites/' + who + '/rotations/' + dir + '.png',
            function(img) { npcSprites[who].idle[dir] = img; onLoaded(); },
            function() { onLoaded(); });
          npcSprites[who].walk[dir] = [];
          for (var f = 0; f < WALK_FRAMES; f++) {
            (function(frame) {
              loadImage('assets/sprites/' + who + '/walk/' + dir + '/frame_00' + frame + '.png',
                function(img) { npcSprites[who].walk[dir][frame] = img; onLoaded(); },
                function() { onLoaded(); });
            })(f);
          }
        });
      });

      // Load animation frames
      for (var animType2 in TILE_ANIMS) {
        var clip = TILE_ANIMS[animType2];
        animStates[animType2] = { frameIndex: 0, timer: 0 };
        clip.frames.forEach(function(framePath) {
          loadImage(framePath,
            function(img) { animFrameImages[framePath] = img; onLoaded(); },
            function() { onLoaded(); });
        });
      }

      if (pending === 0) finishLoading();
    })
    .catch(function(e) {
      loadError = 'Map load failed: ' + e.message;
      console.error(loadError);
    });
}

function finishLoading() {
  console.log('Simulation ready');
  // Cache door images
  doorClosedImg = tileImages['door_closed_wall_brick'];
  doorOpenImg = tileImages['door_opened_wall_brick'];

  // Spawn NPCs outside the house on walkable grass
  npcs = [
    createNPC('kid',  2, 2),
    createNPC('female', 12, 12)
  ];
  // Init camera at midpoint
  var mid = npcMidpoint();
  cam.x = cam.targetX = mid.x;
  cam.y = cam.targetY = mid.y;
  cam.zoom = cam.targetZoom = 3;
  initWeather();

  // Initialize lighting buffer (same approach as game engine)
  if (simLighting.enabled) {
    simLighting.lightLayer = createGraphics(MAP_W * CELL, MAP_H * CELL);
  }

  ready = true;
}

// =============================================
// NPC
// =============================================
function createNPC(type, startX, startY) {
  return {
    type: type,
    x: startX * CELL + CELL / 2,
    y: startY * CELL + CELL / 2,
    targetX: null, targetY: null,
    speed: 1.0 + random(0.4),
    facing: 'south',
    state: 'idle',
    idleTimer: random(40, 120),
    animFrame: 0, animTimer: 0, animSpeed: 8,
    thought: null, thoughtTimer: 0, thoughtAlpha: 0,
    nextThoughtIn: floor(random(30, 90)),
    recentThoughts: [],
    // Shelter state
    sheltering: false,
    shelterTarget: null,
    entryCommentDone: false,
    // Door interaction
    doorTask: null,
    doorPause: 0,
    insideTimer: 0,
    insideHouse: false
  };
}

// =============================================
// CAMERA - tracks both NPCs
// =============================================
function npcMidpoint() {
  if (npcs.length < 2) return { x: MAP_W * CELL / 2, y: MAP_H * CELL / 2 };
  return {
    x: (npcs[0].x + npcs[1].x) / 2,
    y: (npcs[0].y + npcs[1].y) / 2
  };
}

function updateCamera() {
  var mid = npcMidpoint();
  cam.targetX = mid.x;
  cam.targetY = mid.y;

  // Zoom based on distance between NPCs
  var dx = npcs[0].x - npcs[1].x;
  var dy = npcs[0].y - npcs[1].y;
  var dist = sqrt(dx * dx + dy * dy);

  // Map distance to zoom: close = zoomed in, far = zoomed out
  var maxDist = MAP_W * CELL * 0.7;
  var t = constrain(dist / maxDist, 0, 1);
  // Need to fit both NPCs + padding in view
  var neededW = abs(dx) + CAM_PADDING * 2;
  var neededH = abs(dy) + CAM_PADDING * 2;
  var fitZoomW = width / neededW;
  var fitZoomH = height / neededH;
  var fitZoom = min(fitZoomW, fitZoomH);
  cam.targetZoom = constrain(fitZoom, CAM_MIN_ZOOM, CAM_MAX_ZOOM);

  // Smooth lerp
  cam.x += (cam.targetX - cam.x) * CAM_LERP;
  cam.y += (cam.targetY - cam.y) * CAM_LERP;
  cam.zoom += (cam.targetZoom - cam.zoom) * CAM_LERP;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// =============================================
// DOOR HELPERS
// =============================================
function openDoor() {
  if (!door || door.open) return;
  door.open = true;
  blocked.delete(door.x + ',' + door.y);
  // Swap interactive tile type
  for (var i = 0; i < interactiveTiles.length; i++) {
    if (interactiveTiles[i].x === door.x && interactiveTiles[i].y === door.y) {
      interactiveTiles[i].type = 'door_opened_wall_brick';
      interactiveTiles[i].doorState = 'open';
    }
  }
}

function closeDoor() {
  if (!door || !door.open) return;
  door.open = false;
  blocked.add(door.x + ',' + door.y);
  for (var i = 0; i < interactiveTiles.length; i++) {
    if (interactiveTiles[i].x === door.x && interactiveTiles[i].y === door.y) {
      interactiveTiles[i].type = 'door_closed_wall_brick';
      interactiveTiles[i].doorState = 'closed';
    }
  }
}

// Interior walkable cells (inside house walls, not wall/roof border)
var interiorCells = [];
function getInteriorCells() {
  if (interiorCells.length > 0) return interiorCells;
  // Interior = has roof tile AND is walkable (stone_floor)
  for (var k in mapTiles) {
    var layers = mapTiles[k];
    var hasRoof = false, isWalkable = true;
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].layer >= 3 || layers[i].type.indexOf('roof') >= 0) hasRoof = true;
      if (layers[i].walkable === false) isWalkable = false;
    }
    if (hasRoof && isWalkable) {
      var p = k.split(',');
      interiorCells.push({ x: +p[0], y: +p[1] });
    }
  }
  return interiorCells;
}

// Cell just outside door (approach side)
function doorApproachCell() {
  if (!door) return { x: 5, y: 3 };
  return { x: door.x, y: door.y - 1 }; // door faces south, approach from north outside
}

// Cell just inside door
function doorInsideCell() {
  if (!door) return { x: 5, y: 5 };
  return { x: door.x, y: door.y + 1 }; // step inside
}

// =============================================
// NPC AI
// =============================================
var prevRaining = false;

function updateNPC(npc) {
  var raining = weather.active && weather.intensity > 0.15;

  // Rain just stopped - reset shelter state, NPCs can leave
  if (prevRaining && !raining) {
    npc.sheltering = false;
    npc.entryCommentDone = false;
  }

  // Rain started - interrupt normal behavior, seek shelter
  if (raining && !npc.insideHouse && !npc.doorTask && !npc.sheltering) {
    npc.sheltering = true;
    // Trigger rain thought immediately
    if (!npc.thought) {
      var pool = THOUGHTS[npc.type] && THOUGHTS[npc.type].rain;
      if (pool) {
        npc.thought = pickNonRepeat(pool, npc);
        npc.thoughtTimer = 180;
        npc.thoughtAlpha = 0;
      }
    }
    // Head to door if no one else is using it
    if (door) {
      var otherBusy = false;
      for (var ni = 0; ni < npcs.length; ni++) {
        if (npcs[ni] !== npc && npcs[ni].doorTask) otherBusy = true;
      }
      if (!otherBusy) {
        startDoorTask(npc);
      }
    }
  }

  // --- Door task state machine ---
  if (npc.doorTask) {
    updateDoorTask(npc);
  } else if (npc.sheltering && !npc.insideHouse && !npc.doorTask) {
    // Waiting to shelter - retry door when free
    var otherBusy2 = false;
    for (var ni2 = 0; ni2 < npcs.length; ni2++) {
      if (npcs[ni2] !== npc && npcs[ni2].doorTask) otherBusy2 = true;
    }
    if (door && !otherBusy2) startDoorTask(npc);
  } else if (npc.state === 'idle') {
    npc.idleTimer--;
    if (npc.idleTimer <= 0) {
      // 25% chance to go to door if door exists and no other NPC is doing a door task
      // BUT: never exit the house while it's still raining (prevents enter/exit loop)
      var otherDoorBusy = false;
      for (var ni = 0; ni < npcs.length; ni++) {
        if (npcs[ni] !== npc && npcs[ni].doorTask) otherDoorBusy = true;
      }
      var wouldExit = npc.insideHouse && raining;
      if (door && !otherDoorBusy && !wouldExit && random() < 0.25) {
        startDoorTask(npc);
      } else {
        pickRandomTarget(npc);
      }
    }
  }

  if (npc.state === 'walking' && npc.targetX !== null && !npc.doorTask) {
    moveToTarget(npc);
  }

  updateAnimation(npc);
  updateThoughts(npc);
}

function pickRandomTarget(npc) {
  var pool;
  if (npc.insideHouse) {
    pool = getInteriorCells();
  } else {
    pool = null; // pick from all walkable outdoor
  }
  
  for (var a = 0; a < 30; a++) {
    var tx, ty;
    if (pool && pool.length > 0) {
      var c = pool[floor(random(pool.length))];
      tx = c.x; ty = c.y;
    } else {
      tx = floor(random(1, MAP_W - 1));
      ty = floor(random(1, MAP_H - 1));
    }
    if (!blocked.has(tx + ',' + ty)) {
      // If outside, avoid interior cells; if inside, only interior
      if (!npc.insideHouse && roofCells.has(tx + ',' + ty)) continue;
      // Avoid cells adjacent to walls (0.5-cell margin buffer)
      var adjBlocked = blocked.has((tx-1)+','+ty) || blocked.has((tx+1)+','+ty) ||
                       blocked.has(tx+','+(ty-1)) || blocked.has(tx+','+(ty+1));
      if (adjBlocked && random() < 0.8) continue; // mostly avoid, sometimes allow
      // Avoid targets too close to other NPCs
      var tpx = tx * CELL + CELL / 2;
      var tpy = ty * CELL + CELL / 2;
      if (npcTooClose(npc, tpx, tpy)) continue;
      npc.targetX = tpx;
      npc.targetY = tpy;
      npc.state = 'walking';
      return;
    }
  }
  npc.idleTimer = random(30, 90);
}

function startDoorTask(npc) {
  if (npc.insideHouse) {
    // Inside → go to door inside cell, then exit
    var ic = doorInsideCell();
    npc.targetX = ic.x * CELL + CELL / 2;
    npc.targetY = ic.y * CELL + CELL / 2;
    npc.state = 'walking';
    npc.doorTask = 'go_to_door';
    npc._doorWaypoints = [];
  } else {
    // Outside → build waypoint chain to route AROUND the house to the door
    var ac = doorApproachCell(); // (5, 3)
    var npcCx = floor(npc.x / CELL);
    var npcCy = floor(npc.y / CELL);

    // House occupies x=4..10, y=4..10 (walls). Clear zone: y<=3 or y>=11, x<=3 or x>=11
    var waypoints = [];

    // If NPC is south or east of house, route around the top
    var eastOfHouse = npcCx >= 10;
    var southOfHouse = npcCy >= 10;
    var insideHouseColumn = npcCx >= 4 && npcCx <= 10;
    var insideHouseRow = npcCy >= 4 && npcCy <= 10;

    if (eastOfHouse || southOfHouse || (insideHouseColumn && insideHouseRow)) {
      // Step 1: go to clear corner - NPC's x, but above house
      if (npcCy > 3) {
        // First go to the nearest side that's clear, then north
        if (npcCx > 10) {
          // Already east - go north along east side first
          waypoints.push({ x: npcCx, y: 2 });
        } else if (npcCx < 4) {
          // Already west - go north
          waypoints.push({ x: npcCx, y: 2 });
        } else {
          // In the house column range - go east/west to clear, then north
          // Pick whichever side is closer
          var goEast = npcCx >= 7;
          var clearX = goEast ? 11 : 3;
          waypoints.push({ x: clearX, y: npcCy }); // sidestep
          waypoints.push({ x: clearX, y: 2 });      // go north
        }
      }
      // Step 2: go to door column, north of house
      waypoints.push({ x: ac.x, y: 2 });
    }

    // Final target: approach cell
    waypoints.push({ x: ac.x, y: ac.y });

    // Pop first waypoint as immediate target
    var first = waypoints.shift();
    npc.targetX = first.x * CELL + CELL / 2;
    npc.targetY = first.y * CELL + CELL / 2;
    npc._doorWaypoints = waypoints.map(function(w) {
      return { x: w.x * CELL + CELL / 2, y: w.y * CELL + CELL / 2 };
    });
    npc.state = 'walking';
    npc.doorTask = 'go_to_door';
  }
}

function npcNearDoor(npc) {
  if (!door) return false;
  var ac = npc.insideHouse ? doorInsideCell() : doorApproachCell();
  var dx = npc.x - (ac.x * CELL + CELL / 2);
  var dy = npc.y - (ac.y * CELL + CELL / 2);
  return (dx * dx + dy * dy) < CELL * CELL;
}

function updateDoorTask(npc) {
  switch (npc.doorTask) {
    case 'go_to_door':
      moveToTarget(npc);
      if (npc.state === 'idle') {
        // More waypoints to follow?
        if (npc._doorWaypoints && npc._doorWaypoints.length > 0) {
          var next = npc._doorWaypoints.shift();
          npc.targetX = next.x;
          npc.targetY = next.y;
          npc.state = 'walking';
        } else if (npcNearDoor(npc)) {
          npc.doorTask = 'opening';
          npc.doorPause = 30;
        } else {
          // Couldn't reach - abort
          npc.doorTask = null;
          npc.sheltering = false;
          npc._doorWaypoints = [];
          npc.idleTimer = random(60, 180);
        }
      }
      break;
    case 'opening':
      npc.doorPause--;
      if (npc.doorPause <= 0) {
        openDoor();
        npc.doorTask = npc.insideHouse ? 'exit' : 'enter';
        // Walk through
        var target = npc.insideHouse ? doorApproachCell() : doorInsideCell();
        npc.targetX = target.x * CELL + CELL / 2;
        npc.targetY = target.y * CELL + CELL / 2;
        npc.state = 'walking';
      }
      break;
    case 'enter':
      moveToTarget(npc);
      if (npc.state === 'idle') {
        npc.doorTask = 'closing';
        npc.doorPause = 20;
      }
      break;
    case 'exit':
      moveToTarget(npc);
      if (npc.state === 'idle') {
        npc.doorTask = 'closing';
        npc.doorPause = 20;
      }
      break;
    case 'closing':
      npc.doorPause--;
      if (npc.doorPause <= 0) {
        closeDoor();
        // Toggle inside/outside
        if (npc.doorTask === 'closing' && npc.insideHouse) {
          npc.insideHouse = false;
        } else {
          // Just entered
        }
        // Determine final state
        var cx = floor(npc.x / CELL);
        var cy = floor(npc.y / CELL);
        npc.insideHouse = roofCells.has(cx + ',' + cy);
        npc.doorTask = null;
        npc.state = 'idle';
        npc.idleTimer = random(60, 180);
      }
      break;
  }
}

var NPC_SEP = CELL * 0.7; // minimum distance between NPCs

function npcTooClose(npc, px, py) {
  for (var i = 0; i < npcs.length; i++) {
    if (npcs[i] === npc) continue;
    var dx2 = px - npcs[i].x;
    var dy2 = py - npcs[i].y;
    if (dx2 * dx2 + dy2 * dy2 < NPC_SEP * NPC_SEP) return true;
  }
  return false;
}

function moveToTarget(npc) {
  if (npc.targetX === null) { npc.state = 'idle'; return; }
  var dx = npc.targetX - npc.x;
  var dy = npc.targetY - npc.y;
  var dist = sqrt(dx * dx + dy * dy);

  if (dist < 2) {
    npc.state = 'idle';
    npc.idleTimer = random(60, 200);
    npc.targetX = null; npc.targetY = null;
  } else {
    // Avoid overlapping with other NPCs (skip during door tasks - doorway is narrow)
    if (!npc.doorTask && npcTooClose(npc, npc.x, npc.y)) {
      // Already overlapping - nudge apart, but still try to move toward target
      for (var oi = 0; oi < npcs.length; oi++) {
        if (npcs[oi] === npc) continue;
        var sdx = npc.x - npcs[oi].x;
        var sdy = npc.y - npcs[oi].y;
        var sd = sqrt(sdx * sdx + sdy * sdy);
        if (sd < NPC_SEP && sd > 0.1) {
          npc.x += (sdx / sd) * 0.8;
          npc.y += (sdy / sd) * 0.8;
        }
      }
    }

    var vx = (dx / dist) * npc.speed;
    var vy = (dy / dist) * npc.speed;
    var nx = npc.x + vx;
    var ny = npc.y + vy;

    // If next position would overlap another NPC, steer around instead of stopping
    if (!npc.doorTask && npcTooClose(npc, nx, ny)) {
      // Try perpendicular deflection instead of full stop
      var perpX = -vy / npc.speed;
      var perpY = vx / npc.speed;
      var altX = npc.x + perpX * npc.speed;
      var altY = npc.y + perpY * npc.speed;
      if (!npcTooClose(npc, altX, altY)) {
        nx = altX; ny = altY;
      } else {
        altX = npc.x - perpX * npc.speed;
        altY = npc.y - perpY * npc.speed;
        if (!npcTooClose(npc, altX, altY)) {
          nx = altX; ny = altY;
        } else {
          // Truly blocked, wait one beat
          npc.idleTimer = random(10, 25);
          npc.state = 'idle';
          return;
        }
      }
    }

    var M = npc.doorTask ? 0 : CELL * 0.5; // no margin during door tasks

    // Check all 4 corners of the margin box
    function isBlockedAt(px, py) {
      var corners = [
        [px - M, py - M], [px + M, py - M],
        [px - M, py + M], [px + M, py + M]
      ];
      for (var ci = 0; ci < corners.length; ci++) {
        var cx2 = floor(corners[ci][0] / CELL);
        var cy2 = floor(corners[ci][1] / CELL);
        if (cx2 < 0 || cy2 < 0 || cx2 >= MAP_W || cy2 >= MAP_H) return true;
        if (blocked.has(cx2 + ',' + cy2)) return true;
      }
      return false;
    }

    if (isBlockedAt(nx, ny)) {
      // Try sliding: move only on X or only on Y
      var slidX = !isBlockedAt(npc.x + vx, npc.y);
      var slidY = !isBlockedAt(npc.x, npc.y + vy);
      if (slidX) {
        npc.x += vx;
        npc.facing = angleTo8Dir(atan2(0, vx));
      } else if (slidY) {
        npc.y += vy;
        npc.facing = angleTo8Dir(atan2(vy, 0));
      } else {
        npc.state = 'idle';
        npc.idleTimer = random(20, 60);
        npc.targetX = null;
      }
    } else {
      npc.x = nx;
      npc.y = ny;
      npc.facing = angleTo8Dir(atan2(vy, vx));
    }
  }
}

function updateAnimation(npc) {
  if (npc.state === 'walking') {
    npc.animTimer++;
    if (npc.animTimer >= npc.animSpeed) {
      npc.animTimer = 0;
      npc.animFrame = (npc.animFrame + 1) % WALK_FRAMES;
    }
  } else {
    npc.animFrame = 0; npc.animTimer = 0;
  }
}

function pickNonRepeat(pool, npc) {
  var candidates = pool.filter(function(t) { return npc.recentThoughts.indexOf(t) === -1; });
  if (candidates.length === 0) candidates = pool;
  var pick = candidates[floor(random(candidates.length))];
  npc.recentThoughts.push(pick);
  if (npc.recentThoughts.length > 5) npc.recentThoughts.shift();
  return pick;
}

// Dialogue system state
var dialogueState = {
  active: false,
  timer: 800,  // frames until first dialogue (set properly in setup)
  phase: null,       // 'kid' or 'mom'
  kidLine: null,
  momLine: null,
  recentDialogues: []  // indices of recently used dialogues
};

function pickDialogue() {
  var candidates = [];
  for (var i = 0; i < DIALOGUES.length; i++) {
    if (dialogueState.recentDialogues.indexOf(i) === -1) candidates.push(i);
  }
  if (candidates.length === 0) candidates = DIALOGUES.map(function(_, i) { return i; });
  var idx = candidates[floor(random(candidates.length))];
  dialogueState.recentDialogues.push(idx);
  if (dialogueState.recentDialogues.length > 10) dialogueState.recentDialogues.shift();
  return DIALOGUES[idx];
}

function updateDialogue() {
  if (dialogueState.active) {
    // Managed per-NPC in updateThoughts
    return;
  }
  dialogueState.timer--;
  if (dialogueState.timer <= 0) {
    // Only start dialogue if BOTH npcs are free (no active thought)
    var kid = npcs[0], mom = npcs[1];
    if (!kid.thought && !mom.thought && kid.nextThoughtIn > 30 && mom.nextThoughtIn > 30) {
      var pair = pickDialogue();
      dialogueState.active = true;
      dialogueState.phase = 'kid';
      dialogueState.kidLine = pair[0];
      dialogueState.momLine = pair[1];
      // Kid speaks immediately
      kid.thought = pair[0];
      kid.thoughtTimer = 200;
      kid.thoughtAlpha = 0;
      kid.nextThoughtIn = 999;  // suppress normal thoughts during dialogue
      mom.nextThoughtIn = 999;
    } else {
      dialogueState.timer = 60;  // retry shortly
    }
  }
}

function handleDialogueResponse(npc) {
  if (!dialogueState.active) return;
  // When kid's line fades out, trigger mom's response
  if (dialogueState.phase === 'kid' && npc.type === 'kid' && !npc.thought) {
    dialogueState.phase = 'mom';
    var mom = npcs[1];
    mom.thought = dialogueState.momLine;
    mom.thoughtTimer = 260;  // mom holds a bit longer (deadpan delivery)
    mom.thoughtAlpha = 0;
  }
  // When mom's line fades out, dialogue is done
  if (dialogueState.phase === 'mom' && npc.type === 'female' && !npc.thought) {
    dialogueState.active = false;
    dialogueState.timer = floor(random(800, 1500));  // next dialogue in 13-25 seconds
    // Resume normal thought timers
    npcs[0].nextThoughtIn = floor(random(180, 360));
    npcs[1].nextThoughtIn = floor(random(180, 360));
  }
}

function pickThoughtPool(npc) {
  var pools = THOUGHTS[npc.type];
  if (!pools) return null;
  // Rain context
  if (weather.active && weather.intensity > 0.2) return pools.rain;
  // Entry context
  if (npc.insideHouse && !npc.entryCommentDone) {
    npc.entryCommentDone = true;
    return pools.entry;
  }
  // Night context (early night / late night)
  var t = dayNight.time;
  if (pools.night && (t > 0.82 || t < 0.18)) {
    if (random() < 0.45) return pools.night;
  }
  // Weather/daytime context (clear weather, daytime)
  if (pools.weather_day && !weather.active && t > 0.18 && t < 0.82) {
    if (random() < 0.3) return pools.weather_day;
  }
  return pools.normal;
}

function updateThoughts(npc) {
  // If dialogue is active, this NPC is managed by dialogue system
  if (dialogueState.active) {
    if (npc.thought) {
      if (npc.thoughtTimer > 0) {
        npc.thoughtAlpha = min(npc.thoughtAlpha + 0.08, 1);
        npc.thoughtTimer--;
      } else {
        npc.thoughtAlpha -= 0.05;
        if (npc.thoughtAlpha <= 0) {
          npc.thought = null;
          npc.thoughtAlpha = 0;
          handleDialogueResponse(npc);
        }
      }
    }
    return;
  }
  npc.nextThoughtIn--;
  if (npc.nextThoughtIn <= 0 && !npc.thought) {
    // Turn-taking: don't start if the other NPC is still showing a thought
    var otherBusy = false;
    for (var oi = 0; oi < npcs.length; oi++) {
      if (npcs[oi] !== npc && npcs[oi].thought) { otherBusy = true; break; }
    }
    if (otherBusy) { npc.nextThoughtIn = 60; return; }
    var pool = pickThoughtPool(npc);
    if (pool && pool.length > 0) {
      npc.thought = pickNonRepeat(pool, npc);
      npc.thoughtTimer = 240;
      npc.thoughtAlpha = 0;
    }
  }
  if (npc.thought) {
    if (npc.thoughtTimer > 0) {
      // Fade in + hold
      npc.thoughtAlpha = min(npc.thoughtAlpha + 0.08, 1);
      npc.thoughtTimer--;
    } else {
      // Fade out
      npc.thoughtAlpha -= 0.05;
      if (npc.thoughtAlpha <= 0) {
        npc.thought = null;
        npc.thoughtAlpha = 0;
        npc.nextThoughtIn = floor(random(150, 300));
      }
    }
  }
}

function angleTo8Dir(angle) {
  var deg = degrees(angle);
  if (deg < 0) deg += 360;
  var d = ['east','south-east','south','south-west','west','north-west','north','north-east'];
  return d[round(deg / 45) % 8];
}

// =============================================
// WEATHER
// =============================================
function initWeather() {
  // Start clear, first rain after 15-25 seconds
  weather.timer = floor(random(900, 1500));
  weather.active = false;
  weather.intensity = 0;
  weather.targetIntensity = 0;
}

function updateWeather() {
  // Auto-cycle: clear ↔ rain
  weather.timer--;
  if (weather.timer <= 0) {
    if (weather.active) {
      // Stop rain
      weather.active = false;
      weather.targetIntensity = 0;
      weather.timer = floor(random(900, 1800)); // 15-30s clear
    } else {
      // Start rain
      weather.active = true;
      weather.targetIntensity = 0.6 + random(0.4); // 0.6-1.0
      weather.timer = floor(random(600, 1500));     // 10-25s rain
    }
  }

  // Fade intensity
  var fadeSpeed = 0.005;
  if (weather.intensity < weather.targetIntensity) {
    weather.intensity = min(weather.intensity + fadeSpeed, weather.targetIntensity);
  } else if (weather.intensity > weather.targetIntensity) {
    weather.intensity = max(weather.intensity - fadeSpeed * 1.5, weather.targetIntensity);
  }
  weather.ambientAlpha = weather.intensity * 40; // subtle darkening

  // Lightning during rain
  if (lightning.cooldown > 0) lightning.cooldown--;
  if (lightning.active || lightning.alpha > 0) {
    lightning.alpha = max(0, lightning.alpha - lightning.fadeSpeed);
    if (lightning.rumbleAlpha > 0) lightning.rumbleAlpha = max(0, lightning.rumbleAlpha - lightning.fadeSpeed * 0.4);
    if (lightning.alpha <= 0) lightning.active = false;
  }
  if (weather.active && weather.intensity > 0.4 && lightning.cooldown <= 0 && !lightning.active) {
    if (random() < lightning.chance) {
      lightning.active = true;
      lightning.alpha = 200 + random(55);       // bright flash
      lightning.rumbleAlpha = 60 + random(40);   // dim secondary glow
      lightning.cooldown = floor(random(120, 360)); // 2-6s between bolts
    }
  }

  if (weather.intensity < 0.01) {
    weather.particles = [];
    weather.splashes = [];
    return;
  }

  // Spawn rain drops (per-drop shade like game engine)
  var spawnCount = floor(weather.rain.density * weather.intensity);
  for (var i = 0; i < spawnCount; i++) {
    var shade = floor(random(40, 100));
    weather.particles.push({
      x: random(-20, width + 20),
      y: random(-40, -10),
      speed: random(weather.rain.minSpeed, weather.rain.maxSpeed) * weather.intensity,
      len: random(weather.rain.minLen, weather.rain.maxLen),
      drift: weather.rain.drift + random(-0.5, 0.5),
      r: shade * 0.6, g: shade * 0.8, b: shade + random(60, 100),
      a: 120 * weather.intensity + random(-20, 20)
    });
  }

  // Update rain
  for (var r = weather.particles.length - 1; r >= 0; r--) {
    var p = weather.particles[r];
    p.y += p.speed;
    p.x += p.drift;
    if (p.y > height) {
      weather.particles.splice(r, 1);
    }
  }

  // Spawn splashes spread across ground (like game engine)
  var splashCount = floor(weather.splash.density * weather.intensity);
  for (var si = 0; si < splashCount; si++) {
    if (random() < 0.5) {
      var sShade = floor(random(40, 100));
      weather.splashes.push({
        x: random(0, width),
        y: random(60, height),
        radius: 1,
        maxRadius: random(weather.splash.minSize, weather.splash.maxSize),
        expandSpeed: weather.splash.expandSpeed + random(-0.1, 0.1),
        alpha: 150 * weather.intensity + random(-20, 20),
        r: sShade * 0.6, g: sShade * 0.8, b: sShade + random(60, 100)
      });
    }
  }

  // Update splashes
  for (var s = weather.splashes.length - 1; s >= 0; s--) {
    var sp = weather.splashes[s];
    sp.radius += sp.expandSpeed;
    sp.alpha -= weather.splash.fadeSpeed;
    if (sp.alpha <= 0 || sp.radius >= sp.maxRadius) weather.splashes.splice(s, 1);
  }
}

// =============================================
// LIGHTING RENDER (ported from game/js/systems/lighting.js)
// =============================================
function updateDayNight() {
  dayNight.time = (dayNight.time + dayNight.speed) % 1;
}

// Check if a half-cell grid position blocks light (uses blocked Set)
function lightBlocked(hx, hy) {
  // Convert half-cell coords to full cell
  var cx = floor(hx / 2);
  var cy = floor(hy / 2);
  if (cx < 0 || cy < 0 || cx >= MAP_W || cy >= MAP_H) return true;
  return blocked.has(cx + ',' + cy);
}

// DDA ray-cast (ported from game engine castRay)
function castLightRay(startX, startY, angle, maxDist) {
  var dx = cos(angle);
  var dy = sin(angle);
  var HALF = CELL / 2; // 16px

  var gx = floor(startX / HALF);
  var gy = floor(startY / HALF);
  var stepX = dx > 0 ? 1 : -1;
  var stepY = dy > 0 ? 1 : -1;

  var tMaxX, tMaxY, tDeltaX, tDeltaY;
  if (abs(dx) < 0.0001) { tMaxX = Infinity; tDeltaX = Infinity; }
  else {
    var nextX = dx > 0 ? (gx + 1) * HALF : gx * HALF;
    tMaxX = (nextX - startX) / dx;
    tDeltaX = HALF / abs(dx);
  }
  if (abs(dy) < 0.0001) { tMaxY = Infinity; tDeltaY = Infinity; }
  else {
    var nextY = dy > 0 ? (gy + 1) * HALF : gy * HALF;
    tMaxY = (nextY - startY) / dy;
    tDeltaY = HALF / abs(dy);
  }

  var maxIter = ceil(maxDist / HALF) * 2 + 10;
  for (var i = 0; i < maxIter; i++) {
    var t;
    if (tMaxX < tMaxY) {
      t = tMaxX;
      if (t > maxDist) break;
      tMaxX += tDeltaX;
      gx += stepX;
    } else {
      t = tMaxY;
      if (t > maxDist) break;
      tMaxY += tDeltaY;
      gy += stepY;
    }
    if (lightBlocked(gx, gy)) {
      return { x: startX + dx * t, y: startY + dy * t };
    }
  }
  return { x: startX + dx * maxDist, y: startY + dy * maxDist };
}

// Render light with shadow casting (ported from game engine renderLightWithShadows)
function renderPointLight(lg, light) {
  var cx = light.x * CELL;
  var cy = light.y * CELL;
  var radiusPx = light.radius * CELL;

  var rayCount = max(64, floor(128 * min(1, light.radius / 5)));
  var angleStep = TWO_PI / rayCount;
  var falloffSteps = light.radius < 3 ? 15 : 20;

  lg.blendMode(ADD);
  lg.noStroke();

  for (var step = falloffSteps; step >= 1; step--) {
    var nd = step / falloffSteps;  // normalized distance 0..1
    var falloffCurve = 1.0 - pow(nd, 1.0 + light.falloff * 2.0);
    var a = falloffCurve * light.intensity * (light.brightness || 1) * 255;
    var curR = nd * radiusPx;
    if (a <= 2) continue;

    lg.fill(light.color[0], light.color[1], light.color[2], a);
    lg.beginShape();
    lg.vertex(cx, cy);
    for (var i = 0; i <= rayCount; i++) {
      var ang = i * angleStep;
      var hit = castLightRay(cx, cy, ang, curR);
      lg.vertex(hit.x, hit.y);
    }
    lg.endShape(CLOSE);
  }

  lg.blendMode(BLEND);
}

// Render roof shadows (ported from game engine renderRoofShadows)
function renderRoofShadows(lg) {
  if (simLighting.roofShadowDarkness <= 0) return;
  var shadowVal = floor((1.0 - simLighting.roofShadowDarkness) * 255);
  lg.blendMode(MULTIPLY);
  lg.noStroke();
  lg.fill(shadowVal, shadowVal, shadowVal, 255);

  roofCells.forEach(function(key) {
    var p = key.split(',');
    lg.rect(+p[0] * CELL, +p[1] * CELL, CELL, CELL);
  });

  lg.blendMode(BLEND);
}

// Main lighting render - called once per frame
function renderSimLightingLayer() {
  if (!simLighting.enabled || !simLighting.lightLayer) return;

  var dn = getDayNightAmbient();
  var lg = simLighting.lightLayer;
  lg.clear();

  // Ambient fill: brightness * color (same as game engine)
  var ar = dn.color[0] * dn.ambient;
  var ag = dn.color[1] * dn.ambient;
  var ab = dn.color[2] * dn.ambient;
  lg.background(ar, ag, ab, 255);

  // Roof shadows darken interior under ambient
  renderRoofShadows(lg);

  // Point lights (ADD blend brightens dark areas) - always on
  for (var i = 0; i < simLighting.lights.length; i++) {
    var li = simLighting.lights[i];
    if (!li.enabled) continue;
    renderPointLight(lg, li);
  }
}

// Draw the lighting overlay in world-space (MULTIPLY blend, same as game engine drawLighting)
function drawSimLighting() {
  if (!simLighting.enabled || !simLighting.lightLayer) return;
  blendMode(MULTIPLY);
  image(simLighting.lightLayer, 0, 0);
  blendMode(BLEND);
}

function drawWeatherOverlay() {
  if (weather.intensity < 0.01) return;

  // Ambient darkening
  if (weather.ambientAlpha > 0) {
    noStroke();
    fill(30, 40, 60, weather.ambientAlpha);
    rect(0, 0, width, height);
  }

  // Rain streaks (per-drop color like game engine)
  strokeWeight(weather.rain.thickness);
  for (var i = 0; i < weather.particles.length; i++) {
    var p = weather.particles[i];
    stroke(p.r, p.g, p.b, p.a);
    line(p.x, p.y, p.x + p.drift * 0.5, p.y + p.len);
  }

  // Splashes - expanding half-ellipses (like game engine)
  noFill();
  for (var s = 0; s < weather.splashes.length; s++) {
    var sp = weather.splashes[s];
    stroke(sp.r, sp.g, sp.b, sp.alpha);
    strokeWeight(1);
    ellipse(sp.x, sp.y, sp.radius * 2, sp.radius);
  }
}

function drawLightningFlash() {
  if (lightning.alpha <= 0) return;
  noStroke();
  // Main flash - white overlay
  fill(255, 255, 255, lightning.alpha * 0.45);
  rect(0, 0, width, height);
  // Secondary rumble - blue-ish tint
  if (lightning.rumbleAlpha > 0) {
    fill(180, 200, 255, lightning.rumbleAlpha * 0.3);
    rect(0, 0, width, height);
  }
}

// =============================================
// DRAW
// =============================================
function draw() {
  background(26, 26, 46);

  if (loadError) {
    fill(255, 80, 80); textAlign(CENTER, CENTER); textSize(14);
    text(loadError, width / 2, height / 2);
    return;
  }
  if (!ready) {
    fill(200); textAlign(CENTER, CENTER); textSize(14);
    text(SIM_LANG === 'hr' ? 'U\u010ditavanje\u2026' : SIM_LANG === 'de' ? 'Laden\u2026' : 'Loading\u2026', width / 2, height / 2);
    return;
  }

  // Update NPCs
  for (var i = 0; i < npcs.length; i++) updateNPC(npcs[i]);
  updateDialogue();
  prevRaining = weather.active && weather.intensity > 0.15;
  updateCamera();
  updateTileAnimations();
  updateWeather();
  updateDayNight();
  renderSimLightingLayer();

  // Check if any NPC is under roof
  var npcUnderRoof = false;
  for (var n = 0; n < npcs.length; n++) {
    var cx = floor(npcs[n].x / CELL);
    var cy = floor(npcs[n].y / CELL);
    if (roofCells.has(cx + ',' + cy)) { npcUnderRoof = true; break; }
  }

  push();
  translate(width / 2, height / 2);
  scale(cam.zoom);
  translate(-cam.x, -cam.y);

  // Layer 0: ground
  drawTileLayer(0, 0);
  // Layer 1: walls
  drawTileLayer(1, 1);
  // Interactive tiles (doors, lights)
  drawInteractiveTiles();
  // NPCs (drawn between walls and roof)
  for (var j = 0; j < npcs.length; j++) drawNPC(npcs[j]);
  // Lighting overlay BEFORE roof (MULTIPLY darkens ground, walls, tiles, NPCs)
  // Matches game engine: roof is drawn AFTER lighting so light doesn't bleed through
  drawSimLighting();
  // Layer 3: roof - drawn AFTER lighting, darkened with MULTIPLY overlay
  // (ported from game engine drawRoofTiles: MULTIPLY rect, not tint)
  if (!npcUnderRoof) {
    drawTileLayer(3, 99);
    var dn = getDayNightAmbient();
    var rr = Math.round(dn.color[0] * dn.ambient);
    var rg = Math.round(dn.color[1] * dn.ambient);
    var rb = Math.round(dn.color[2] * dn.ambient);
    if (rr < 255 || rg < 255 || rb < 255) {
      blendMode(MULTIPLY);
      noStroke();
      fill(rr, rg, rb);
      roofCells.forEach(function(key) {
        var p = key.split(',');
        rect(+p[0] * CELL, +p[1] * CELL, CELL, CELL);
      });
      blendMode(BLEND);
    }
  }

  pop();

  // Weather overlay (screen-space, on top of everything)
  drawWeatherOverlay();

  // Lightning flash overlay
  drawLightningFlash();

  // Thought bubbles - drawn last, above everything, in screen space
  for (var tb = 0; tb < npcs.length; tb++) {
    if (npcs[tb].thought && npcs[tb].thoughtAlpha > 0) drawThoughtBubble(npcs[tb]);
  }
}

function updateTileAnimations() {
  var dt = 1 / 60; // ~60fps
  for (var tileType in animStates) {
    var state = animStates[tileType];
    var clip = TILE_ANIMS[tileType];
    if (!clip || clip.frames.length <= 1) continue;
    state.timer += dt;
    var frameDuration = 1.0 / clip.frameRate;
    while (state.timer >= frameDuration) {
      state.timer -= frameDuration;
      state.frameIndex++;
      if (state.frameIndex >= clip.frames.length) {
        state.frameIndex = clip.loop ? 0 : clip.frames.length - 1;
      }
    }
  }
}

function getAnimFrame(tileType) {
  var state = animStates[tileType];
  if (!state) return null;
  var clip = TILE_ANIMS[tileType];
  if (!clip) return null;
  var path = clip.frames[state.frameIndex];
  return animFrameImages[path] || null;
}

// Apply transform matching the engine: rotation first, then flipState
function applyTransform(t) {
  if (!t) return;
  if (t.rotation) rotate(radians(t.rotation));
  var fs = typeof t.flipState !== 'undefined' ? t.flipState : (t.flipped ? 1 : 0);
  var sx = 1, sy = 1;
  if (fs === 1) sx = -1;
  else if (fs === 2) { sx = -1; sy = -1; }
  else if (fs === 3) sy = -1;
  if (sx !== 1 || sy !== 1) scale(sx, sy);
}

function drawTileLayer(minLayer, maxLayer) {
  for (var k in mapTiles) {
    var p = k.split(',');
    var x = +p[0], y = +p[1];
    var layers = mapTiles[k];
    for (var i = 0; i < layers.length; i++) {
      var tile = layers[i];
      var tl = tile.layer || 0;
      if (tl < minLayer || tl > maxLayer) continue;
      // Use animation frame if available, else static image
      var img = getAnimFrame(tile.type) || tileImages[tile.type];
      if (img) {
        push();
        translate(x * CELL + CELL / 2, y * CELL + CELL / 2);
        applyTransform(tile.transform);
        image(img, -CELL / 2, -CELL / 2, CELL, CELL);
        pop();
      } else {
        fill(getFallbackColor(tile.type));
        noStroke();
        rect(x * CELL, y * CELL, CELL, CELL);
      }
    }
  }
}

function drawInteractiveTiles() {
  for (var i = 0; i < interactiveTiles.length; i++) {
    var it = interactiveTiles[i];
    // Only draw door tiles; hide light bulbs and other non-door interactive tiles
    if (it.type.indexOf('door') < 0) continue;
    var img = tileImages[it.type];
    if (img) {
      push();
      translate(it.x * CELL + CELL / 2, it.y * CELL + CELL / 2);
      applyTransform(it.transform);
      image(img, -CELL / 2, -CELL / 2, CELL, CELL);
      pop();
    }
  }
}

function drawNPC(npc) {
  var sp = npcSprites[npc.type];
  if (!sp) return;
  var img = null;
  if (npc.state === 'walking' && sp.walk[npc.facing]) {
    img = sp.walk[npc.facing][npc.animFrame];
  }
  if (!img && sp.idle[npc.facing]) img = sp.idle[npc.facing];
  if (!img) return;

  push();
  translate(npc.x, npc.y);
  imageMode(CENTER);
  var sz = CELL * 0.9;
  image(img, 0, -sz * 0.15, sz, sz);
  pop();

}

function drawThoughtBubble(npc) {
  push();
  // Convert world position to screen position
  var bx = (npc.x - cam.x) * cam.zoom + width / 2;
  var by = (npc.y - CELL * 0.85 - cam.y) * cam.zoom + height / 2;
  var fontSize = constrain(11, 8, 14);
  textSize(fontSize);
  var tw = textWidth(npc.thought) + fontSize * 2.5;
  var th = fontSize * 2.8;
  var a = npc.thoughtAlpha * 220;

  fill(255, 255, 255, a);
  stroke(180, 180, 200, a);
  strokeWeight(0.5);
  rectMode(CENTER);
  rect(bx, by, tw, th, fontSize * 0.5);

  noStroke();
  fill(255, 255, 255, a);
  triangle(bx - 2, by + th / 2, bx + 2, by + th / 2, bx, by + th / 2 + 3);

  fill(40, 40, 60, a);
  textAlign(CENTER, CENTER);
  text(npc.thought, bx, by - 0.5);
  pop();
}

function getFallbackColor(type) {
  if (type.indexOf('grass') >= 0) return color(100, 200, 100);
  if (type.indexOf('wall') >= 0 || type.indexOf('brick') >= 0) return color(139, 90, 43);
  if (type.indexOf('stone') >= 0) return color(140, 140, 140);
  if (type.indexOf('dirt') >= 0) return color(160, 120, 60);
  if (type.indexOf('roof') >= 0) return color(120, 100, 80);
  return color(80, 80, 80);
}
